<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1e3a5f"/>
  <!-- Neural network nodes -->
  <!-- Input layer (left) -->
  <circle cx="14" cy="20" r="4.5" fill="#60a5fa"/>
  <circle cx="14" cy="32" r="4.5" fill="#60a5fa"/>
  <circle cx="14" cy="44" r="4.5" fill="#60a5fa"/>
  <!-- Hidden layer (centre) -->
  <circle cx="32" cy="15" r="4.5" fill="#818cf8"/>
  <circle cx="32" cy="27" r="4.5" fill="#818cf8"/>
  <circle cx="32" cy="39" r="4.5" fill="#818cf8"/>
  <circle cx="32" cy="51" r="4.5" fill="#818cf8"/>
  <!-- Output layer (right) -->
  <circle cx="50" cy="22" r="4.5" fill="#34d399"/>
  <circle cx="50" cy="34" r="4.5" fill="#34d399"/>
  <circle cx="50" cy="46" r="4.5" fill="#34d399"/>
  <!-- Connections input→hidden -->
  <line x1="18" y1="20" x2="27" y2="15" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="18" y1="20" x2="27" y2="27" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="18" y1="32" x2="27" y2="27" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="18" y1="32" x2="27" y2="39" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="18" y1="44" x2="27" y2="39" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="18" y1="44" x2="27" y2="51" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Connections hidden→output -->
  <line x1="36" y1="15" x2="45" y2="22" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="36" y1="27" x2="45" y2="22" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="36" y1="27" x2="45" y2="34" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="36" y1="39" x2="45" y2="34" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="36" y1="39" x2="45" y2="46" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="36" y1="51" x2="45" y2="46" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
</svg>
