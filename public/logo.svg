<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Brain/neural network icon -->
  <g transform="translate(4, 4)">
    <!-- Outer circle -->
    <circle cx="20" cy="20" r="18" fill="#1e3a5f" />
    <!-- Neural network nodes -->
    <!-- Input layer -->
    <circle cx="8"  cy="12" r="3" fill="#60a5fa"/>
    <circle cx="8"  cy="20" r="3" fill="#60a5fa"/>
    <circle cx="8"  cy="28" r="3" fill="#60a5fa"/>
    <!-- Hidden layer -->
    <circle cx="20" cy="9"  r="3" fill="#818cf8"/>
    <circle cx="20" cy="17" r="3" fill="#818cf8"/>
    <circle cx="20" cy="25" r="3" fill="#818cf8"/>
    <circle cx="20" cy="33" r="3" fill="#818cf8"/>
    <!-- Output layer -->
    <circle cx="32" cy="14" r="3" fill="#34d399"/>
    <circle cx="32" cy="22" r="3" fill="#34d399"/>
    <circle cx="32" cy="30" r="3" fill="#34d399"/>
    <!-- Connections input→hidden -->
    <line x1="11" y1="12" x2="17" y2="9"  stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="11" y1="12" x2="17" y2="17" stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="11" y1="12" x2="17" y2="25" stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="11" y1="20" x2="17" y2="9"  stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="11" y1="20" x2="17" y2="17" stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="11" y1="20" x2="17" y2="25" stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="11" y1="20" x2="17" y2="33" stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="11" y1="28" x2="17" y2="17" stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="11" y1="28" x2="17" y2="25" stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="11" y1="28" x2="17" y2="33" stroke="#60a5fa" stroke-width="0.7" stroke-opacity="0.6"/>
    <!-- Connections hidden→output -->
    <line x1="23" y1="9"  x2="29" y2="14" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="23" y1="9"  x2="29" y2="22" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="23" y1="17" x2="29" y2="14" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="23" y1="17" x2="29" y2="22" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="23" y1="17" x2="29" y2="30" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="23" y1="25" x2="29" y2="14" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="23" y1="25" x2="29" y2="22" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="23" y1="25" x2="29" y2="30" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="23" y1="33" x2="29" y2="22" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="23" y1="33" x2="29" y2="30" stroke="#818cf8" stroke-width="0.7" stroke-opacity="0.6"/>
  </g>
  <!-- Text: ML -->
  <text x="50" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="#1e3a5f" letter-spacing="-0.5">ML</text>
  <!-- Dot separator -->
  <circle cx="94" cy="27" r="3" fill="#3b82f6"/>
  <!-- Text: ACADEMY -->
  <text x="101" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#3b82f6" letter-spacing="1">ACADEMY</text>
  <!-- Tagline -->
  <text x="50" y="43" font-family="'Segoe UI', Arial, sans-serif" font-size="7.5" font-weight="400" fill="#64748b" letter-spacing="1.5">LEARN · BUILD · MASTER</text>
</svg>
